# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "alexandria"

[setup]
script = '''
cd "$CODEX_WORKTREE_PATH"
set -euo pipefail

touch .env
uv sync --dev --frozen
uv run python -m compileall src
uv run pytest --collect-only -q
'''

[cleanup]
script = '''
cd "$CODEX_WORKTREE_PATH"

docker compose --profile infrastructure down --remove-orphans || true
rm -rf .pytest_cache .logs .cache/tmp
'''

[[actions]]
name = "Check"
icon = "tool"
command = "cd \"$CODEX_WORKTREE_PATH\" && uv run python -m compileall src && uv run pytest"

[[actions]]
name = "Db up"
icon = "tool"
command = "cd \"$CODEX_WORKTREE_PATH\" && docker compose --profile infrastructure up -d"

[[actions]]
name = "API + worker"
icon = "tool"
command = "cd \"$CODEX_WORKTREE_PATH\" && uv run alexandria api worker"
