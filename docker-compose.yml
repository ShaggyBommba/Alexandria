version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${ALEXANDRIA_DATABASE__DATABASE:-alexandria}
      POSTGRES_USER: ${ALEXANDRIA_DATABASE__USER:-alexandria}
      POSTGRES_PASSWORD: ${ALEXANDRIA_DATABASE__PASSWORD:-alexandria}
    ports:
      - "${ALEXANDRIA_DATABASE__PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    profiles:
      - infrastructure
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${ALEXANDRIA_DATABASE__USER:-alexandria} -d ${ALEXANDRIA_DATABASE__DATABASE:-alexandria}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  alexandria:
    build:
      context: .
    command: ["alexandria", "api", "worker"]
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - application
    environment:
      ALEXANDRIA_DATABASE__HOST: db
      ALEXANDRIA_DATABASE__PORT: 5432
      ALEXANDRIA_APP__API_HOST: 0.0.0.0
      ALEXANDRIA_APP__API_PORT: 8002
      ALEXANDRIA_APP__MCP_HOST: 0.0.0.0
      ALEXANDRIA_APP__MCP_PORT: 9002
    env_file:
      - .env
    ports:
      - "8002:8002"
    restart: unless-stopped

volumes:
  postgres_data:
