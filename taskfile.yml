version: '3'

dotenv: ['.env']


tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  setup:
    desc: Set up the development environment
    cmds:
      - uv sync --no-dev
      - uv sync --dev
      - git config --unset-all core.hooksPath || true
      - uv run pre-commit install -c .githooks/.pre-commit-config.yaml --hook-type pre-commit --hook-type pre-push
      - uv run pre-commit run -c .githooks/.pre-commit-config.yaml --all-files

  sync:
    desc: Sync the full uv workspace
    cmds:
      - uv sync

  test:
    desc: Run checks and tests
    cmds:
      - task lint
      - uv run pytest

  lint:
    desc: Lint all modules
    cmds:
      - uv run ruff check src tests
      - uv run python -m compileall src tests

  fmt:
    desc: Format all modules
    cmds:
      - uv run ruff check --fix src tests
      - uv run ruff format src tests

  check:
    desc: Run checks and tests
    cmds:
      - task test
    
  start:
    desc: Start the API, worker, and MCP servers
    cmds:
      - lsof -i :8002 -t | xargs -r kill -9
      - lsof -i :9002 -t | xargs -r kill -9
      - uv run alexandria api mcp worker

  deploy:
    desc: Build and start the Docker Compose stack
    vars:
      BUILD_FLAG: '{{.BUILD_FLAG | default "--build"}}'
      PROFILE_FLAG: '{{.PROFILE_FLAG | default "--profile infrastructure"}}'
    cmds:
      - docker compose {{.PROFILE_FLAG}} up -d {{.BUILD_FLAG}} {{.CLI_ARGS}}

  teardown:
    desc: Stop and remove the Docker Compose stack
    vars:
      PROFILE_FLAG: '{{.PROFILE_FLAG | default "--profile infrastructure"}}'
    cmds:
      - docker compose {{.PROFILE_FLAG}} down --remove-orphans {{.CLI_ARGS}}

  logs:
    desc: Tail logs for the Docker Compose stack
    vars:
      PROFILE_FLAG: '{{.PROFILE_FLAG | default "--profile infrastructure"}}'
    cmds:
      - docker compose {{.PROFILE_FLAG}} logs -f {{.CLI_ARGS}}
